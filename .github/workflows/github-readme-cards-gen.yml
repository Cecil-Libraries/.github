name: Generate README Cards

on:
  workflow_call:
    inputs:
      manual_repos:
        description: "JSON array of repositories to process"
        required: false
        default: '[]'
      repository_owner:
        description: "The Repository Owner (User, not Org)"
        required: false
        default: "Cecil-Libraries"
      is_user:
        description: "True for user, false for organization"
        type: boolean
        required: false
        default: false
      theme:
        description: "Theme to use"
        required: false
        default: "shades-of-purple"
    secrets:
      github_token:
        required: false
  workflow_dispatch:
    inputs:
      manual_repos:
        description: "JSON array of repositories to process"
        required: false
        default: '[]'
      repository_owner:
        description: "The Repository Owner (User, not Org)"
        required: false
        default: "Cecil-Libraries"
      is_user:
        description: "True for user, false for organization"
        type: boolean
        required: false
        default: false
      theme:
        description: "Theme to use"
        required: false
        default: "shades-of-purple"
    secrets:
      github_token:
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ${{ github.event.inputs.repository_owner || 'Cecil-Libraries' }}
      ACTIVE_THEME: ${{ github.event.inputs.theme || 'shades-of-purple' }}
      ACTIVE_TOKEN: ${{ secrets.github_token || secrets.STATS || github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        if: ${{ github.event.inputs.is_user == 'true' }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ env.REPO_OWNER }}&show_icons=true&theme=${{ env.ACTIVE_THEME }}
          path: profile/stats.svg
          token: ${{ env.ACTIVE_TOKEN }}

      - name: Generate top languages card
        if: ${{ github.event.inputs.is_user == 'true' }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ env.REPO_OWNER }}&layout=compact&langs_count=6&theme=${{ env.ACTIVE_THEME }}
          path: profile/top-langs.svg
          token: ${{ env.ACTIVE_TOKEN }}

      - name: Commit cards
        if: ${{ github.event.inputs.is_user == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push

  call-repo-cards:
    needs: build
    if: ${{ github.event.inputs.manual_repos != '[]' }}
    strategy:
      matrix:
        repo: ${{ fromJSON(github.event.inputs.manual_repos) }}
    uses: ./.github/workflows/repository-cards.yml
    with:
      repo_author: ${{ github.event.inputs.repository_owner || 'Cecil-Libraries' }}
      repo_name: ${{ matrix.repo }}
      theme: ${{ github.event.inputs.theme || 'shades-of-purple' }}
    secrets:
      token: ${{ github.event.inputs.github_token || secrets.STATS || github.token }}
