name: Generate Repository Cards

on:
  workflow_dispatch:
    inputs:
      repo_author:
        description: "GitHub Username"
        required: true
        default: "your-username"
      repo_name:
        description: "Repository Name"
        required: true
        default: "your-repo"
      theme:
        description: "Card Theme"
        required: false
        default: "shades-of-purple"
    secrets:
      token:
        required: false

  workflow_call:
    inputs:
      repo_author:
        type: string
        required: true
      repo_name:
        type: string
        required: true
      theme:
        type: string
        required: false
        default: "shades-of-purple"
    secrets:
      token:
        required: false

jobs:
  build:
    strategy:
      max-parallel: 1
    runs-on: ubuntu-latest
    env:
      ACTIVE_TOKEN: ${{ secrets.token || secrets.STATS || github.token }}
      REPO_AUTHOR: ${{ inputs.repo_author }}
      REPO_NAME: ${{ inputs.repo_name }}
      THEME: ${{ inputs.theme }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure profile directory exists
        run: mkdir -p profile

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ env.REPO_AUTHOR }}&repo=${{ env.REPO_NAME }}&theme=${{ env.THEME }}&show=reviews,discussions_started,discussions_answered,prs_merged,prs_merged_percentage
          path: profile/${{ env.REPO_AUTHOR }}-${{ env.REPO_NAME }}.svg
          token: ${{ env.ACTIVE_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/${{ env.REPO_AUTHOR }}-${{ env.REPO_NAME }}.svg
          git commit -m "Update Pin Card for ${{ env.REPO_NAME }}" || exit 0
          git pull --rebase
          git push
