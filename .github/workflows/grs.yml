name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=shades-of-purple
          path: profile/stats.svg
          token: ${{ secrets.STATS }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=shades-of-purple
          path: profile/top-langs.svg
          token: ${{ secrets.STATS }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
      
  call-repo-cards:
    needs: build
    uses: ./.github/workflows/repository-cards.yml
    with:
      repo_author: "Cecil-Libraries"
      repo_name: "Cecil-ANSI-Utils"
      theme: "shades-of-purple"
    secrets: inherit
